
<div style="max-width:920px; margin:0 auto 28px auto;">
<svg viewBox="0 0 940 360" xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" role="img" 
aria-label="Diagram of the T3 IGI Airport Wi-Fi network: 
a client device connects to a Cisco access point, which tunnels to a wireless controller; 
unauthenticated traffic is redirected to a captive portal requiring SMS OTP; 
once authenticated, traffic flows through Tata Docomo's uplink, which performs NAT to a public IP, out to the internet.">
 
  <title>T3, IGI Airport — Wi-Fi Network Topology (October 2016)</title>
 
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A5A7A"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#C2703D"/>
    </marker>
  </defs>
 
  <!-- Title -->
  <text x="470" y="26" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="19" 
  font-weight="700" fill="#1F2D3A">T3, IGI Airport — Wi-Fi Network Topology (October 2016)</text>
  <!-- 
  <text x="470" y="46" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="12" 
  font-style="italic" fill="#7A8B9A">Reconstructed from the October 2016 walkthrough below — see the editor's note 
  above for what's changed since</text>
  -->
 
  <!-- Client Device box -->
  <rect x="20" y="70" width="120" height="80" rx="4" fill="#EEF3F8" stroke="#3A5A7A" stroke-width="1.5"/>
  <circle cx="80" cy="98" r="7" fill="none" stroke="#3A5A7A" stroke-width="1.5"/>
  <path d="M71,93 a13,13 0 0 1 18,0" fill="none" stroke="#3A5A7A" stroke-width="1.5"/>
  <path d="M65,87 a21,21 0 0 1 30,0" fill="none" stroke="#3A5A7A" stroke-width="1.5"/>
  <text x="80" y="125" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="13" 
  font-weight="700" fill="#1F2D3A">Client Device</text>
  <text x="80" y="140" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="10" 
  fill="#5B6B7A">phone / laptop</text>
 
  <!-- AP box -->
  <rect x="210" y="80" width="140" height="70" rx="4" fill="#EEF3F8" stroke="#3A5A7A" stroke-width="1.5"/>
  <path d="M270,98 a14,14 0 0 1 20,0" fill="none" stroke="#3A5A7A" stroke-width="1.5"/>
  <path d="M265,91 a23,23 0 0 1 32,0" fill="none" stroke="#3A5A7A" stroke-width="1.5"/>
  <circle cx="280" cy="106" r="2.5" fill="#3A5A7A"/>
  <text x="280" y="125" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="13" 
  font-weight="700" fill="#1F2D3A">Cisco AP</text>
  <text x="280" y="140" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" 
  font-size="10" fill="#5B6B7A">lightweight mode</text>
 
  <!-- Controller box -->
  <rect x="410" y="80" width="160" height="70" rx="4" fill="#EEF3F8" stroke="#3A5A7A" stroke-width="1.5"/>
  <rect x="470" y="92" width="40" height="9" rx="1.5" fill="none" stroke="#3A5A7A" stroke-width="1.3"/>
  <rect x="470" y="104" width="40" height="9" rx="1.5" fill="none" stroke="#3A5A7A" stroke-width="1.3"/>
  <text x="490" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="13" 
  font-weight="700" fill="#1F2D3A">Wireless Controller</text>
  <text x="490" y="145" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="10" fill="#5B6B7A">WLC</text>
 
  <!-- Uplink box -->
  <rect x="630" y="80" width="150" height="70" rx="4" fill="#EEF3F8" stroke="#3A5A7A" stroke-width="1.5"/>
  <path d="M695,98 l12,0 l-4,-4 m4,4 l-4,4" fill="none" stroke="#3A5A7A" stroke-width="1.5"/>
  <path d="M707,108 l-12,0 l4,-4 m-4,4 l4,4" fill="none" stroke="#3A5A7A" stroke-width="1.5"/>
  <text x="705" y="128" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="13" 
  font-weight="700" fill="#1F2D3A">Tata Docomo Uplink</text>
  <text x="705" y="142" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="10" 
  fill="#5B6B7A">performs NAT</text>
 
  <!-- Internet cloud -->
  <g transform="translate(820,90)">
    <path d="M20,45 a18,18 0 0 1 -2,-35 a22,22 0 0 1 42,-6 a16,16 0 0 1 18,28 a16,16 0 0 1 -3,13 z" fill="#F1F1F1" 
    stroke="#3A5A7A" stroke-width="1.5"/>
    <text x="38" y="32" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="12" 
    font-weight="700" fill="#1F2D3A">Internet</text>
  </g>
 
  <!-- Horizontal connecting arrows -->
  <line x1="140" y1="115" x2="206" y2="115" stroke="#3A5A7A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="173" y="108" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="9.5" 
  fill="#5B6B7A">802.11n</text>
  <text x="173" y="128" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="9.5" 
  fill="#5B6B7A">2.4GHz</text>
 
  <line x1="350" y1="115" x2="406" y2="115" stroke="#3A5A7A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="378" y="108" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="9.5" 
  fill="#5B6B7A">CAPWAP</text>
 
  <line x1="570" y1="115" x2="626" y2="115" stroke="#3A5A7A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="598" y="108" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="9" 
  fill="#5B6B7A">auth'd</text>
  <text x="598" y="128" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="9" 
  fill="#5B6B7A"> traffic</text>
 
  <line x1="780" y1="115" x2="816" y2="115" stroke="#3A5A7A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="798" y="108" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="9" fill="#5B6B7A">NAT</text>
 
  <!-- IP annotation strips -->
  <rect x="20" y="172" width="330" height="34" rx="3" fill="none" stroke="#9CB3C4" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="195" y="184" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" 
  font-size="10" fill="#3A5A7A">client IP: 100.77.32.0/20</text>
  <text x="195" y="198" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" 
  font-size="10" fill="#3A5A7A">"Shared Address Space" (RFC 6598 / CGNAT)</text>
 
  <rect x="630" y="172" width="290" height="34" rx="3" fill="none" stroke="#9CB3C4" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="775" y="184" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" 
  font-size="10" fill="#3A5A7A">egress NAT → public IP</text>
  <text x="775" y="198" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" 
  font-size="10" fill="#3A5A7A">49.248.225.35</text>
 
  <!-- Captive portal gate, branching down from the controller -->
  <line x1="490" y1="150" x2="490" y2="252" stroke="#C2703D" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowAmber)"/>
  <!-- padlock icon on the gate line, positioned clear of the IP annotation strip above it -->
  <g transform="translate(478,210)">
    <rect x="0" y="6" width="24" height="18" rx="2.5" fill="#FBEEE3" stroke="#C2703D" stroke-width="1.5"/>
    <path d="M5,6 v-5 a7,7 0 0 1 14,0 v5" fill="none" stroke="#C2703D" stroke-width="1.5"/>
  </g>
  <text x="520" y="220" text-anchor="start" font-family="Consolas, 'Courier New', monospace" 
  font-size="9.5" fill="#C2703D">blocked until OTP</text>
  <text x="520" y="233" text-anchor="start" font-family="Consolas, 'Courier New', monospace" 
  font-size="9.5" fill="#C2703D">verified</text>
 
  <!-- Captive Portal box -->
  <rect x="410" y="260" width="160" height="68" rx="4" fill="#FBEEE3" stroke="#C2703D" stroke-width="1.5"/>
  <text x="490" y="290" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" 
  font-size="13" font-weight="700" fill="#7A3F1D">Captive Portal</text>
  <text x="490" y="306" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" 
  font-size="10" fill="#8C5A33">SMS OTP required</text>
  <text x="490" y="319" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" 
  font-size="9" fill="#8C5A33">45 min free session</text>
 
  <!-- Footer caption -->
  <text x="470" y="350" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="10.5" font-style="italic" fill="#9AA7B2">Until OTP verification succeeds, the controller redirects all traffic to the captive portal instead of releasing it to the uplink.</text>
 
</svg>
</div>
