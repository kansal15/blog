<svg width="600" height="820" viewBox="0 0 600 820" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Expanded timeline of DNS root server evolution from 1983 to 2025</title>
<desc>A vertical timeline diagram showing ten milestones in the history of DNS root servers: 
  1983 introduction of the Domain Name System, 1984 first root server at ISI, 1985 four root servers, 
  1987 ISI root server renamed, 1995 root servers renamed to single letters A through M, 
  1997 thirteen logical root servers finalized, October 2002 DDoS attack disabling 9 of 13 servers, 
  2002 to 2008 anycast deployment begins, 2006 removal of the .mil zone, 2008 IPv6 added to the root zone, 
  2010 DNSSEC signing of the root zone, and 2025 present day with approximately 1,950 anycast instances across 13 logical servers.</desc>

<rect x="0" y="0" width="600" height="820" fill="#ffffff"/>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<line x1="50" y1="55" x2="50" y2="760" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<circle cx="50" cy="80" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="74" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">1983 — DNS introduced</text>
<text x="74" y="93" font-family="Arial, sans-serif" font-size="12" fill="#5f5e5a">RFC 882 / 883 define the Domain Name System</text>

<circle cx="50" cy="140" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="74" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">1984 — First root server</text>
<text x="74" y="153" font-family="Arial, sans-serif" font-size="12" fill="#5f5e5a">ISI, University of Southern California · 1 node</text>

<circle cx="50" cy="200" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="74" y="195" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">1985 — Early growth</text>
<text x="74" y="213" font-family="Arial, sans-serif" font-size="12" fill="#5f5e5a">SRI-NIC, ISI, BRL-AOS · 4 nodes</text>

<circle cx="50" cy="260" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="74" y="255" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">1987 — ISI server renamed</text>
<text x="74" y="273" font-family="Arial, sans-serif" font-size="12" fill="#5f5e5a">ISIB retired; replaced by ISIA, then ISIC</text>

<circle cx="50" cy="320" r="7" fill="#B5D4F4" stroke="#185fa5" stroke-width="0.5"/>
<text x="74" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53">1995 — Single-letter naming</text>
<text x="74" y="333" font-family="Arial, sans-serif" font-size="12" fill="#185fa5">Servers renamed A through M for clarity</text>

<circle cx="50" cy="380" r="7" fill="#B5D4F4" stroke="#185fa5" stroke-width="0.5"/>
<text x="74" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53">1997 — 13 servers finalized</text>
<text x="74" y="393" font-family="Arial, sans-serif" font-size="12" fill="#185fa5">J, K, L, M added · DNS compression enables it</text>

<circle cx="50" cy="440" r="7" fill="#F5C4B3" stroke="#993c1d" stroke-width="0.5"/>
<text x="74" y="435" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Oct 21, 2002 — DDoS attack</text>
<text x="74" y="453" font-family="Arial, sans-serif" font-size="12" fill="#993c1d">9 of 13 servers disabled for about an hour</text>

<circle cx="50" cy="500" r="7" fill="#9FE1CB" stroke="#0f6e56" stroke-width="0.5"/>
<text x="74" y="495" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">2002–2008 — Anycast era begins</text>
<text x="74" y="513" font-family="Arial, sans-serif" font-size="12" fill="#0f6e56">Each letter now served by many physical sites</text>

<circle cx="50" cy="560" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="74" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">2006 — .mil zone removed</text>
<text x="74" y="573" font-family="Arial, sans-serif" font-size="12" fill="#5f5e5a">A, B, E, F, G, H stop serving .mil records</text>

<circle cx="50" cy="620" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="74" y="615" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">2008 — IPv6 added to root zone</text>
<text x="74" y="633" font-family="Arial, sans-serif" font-size="12" fill="#5f5e5a">AAAA records enabled by EDNS0</text>

<circle cx="50" cy="680" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="74" y="675" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">2010 — DNSSEC at the root</text>
<text x="74" y="693" font-family="Arial, sans-serif" font-size="12" fill="#5f5e5a">Root zone signed, enabling end-to-end DNS trust</text>

<circle cx="50" cy="740" r="8" fill="#CECBF6" stroke="#534ab7" stroke-width="0.5"/>
<text x="74" y="735" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">2025 — Present day</text>
<text x="74" y="753" font-family="Arial, sans-serif" font-size="12" fill="#534ab7">13 logical servers, ~1,950 anycast instances</text>

<rect x="74" y="775" width="440" height="32" rx="6" fill="#EEEDFE" stroke="#534ab7" stroke-width="0.5"/>
<text x="294" y="795" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle">13 names. ~1,950 physical sites. One Root DNS System.</text>

</svg>
