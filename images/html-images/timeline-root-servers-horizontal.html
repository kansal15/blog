<svg width="1180" height="280" viewBox="0 0 1180 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Expanded horizontal timeline of DNS root server evolution from 1983 to 2025</title>
<desc>A horizontal timeline diagram showing ten milestones left to right: 1983 DNS introduced, 1984 first root server, 
    1985 four root servers, 1987 ISI server renamed, 1995 single-letter naming A through M, 1997 thirteen servers finalized, 
    October 2002 DDoS attack, 2002-2008 anycast era begins, 2006 .mil zone removed, 2008 IPv6 added to root zone, 
    2010 DNSSEC signed at root, and 2025 present day with about 1,950 anycast instances.</desc>

<rect x="0" y="0" width="1180" height="280" fill="#ffffff"/>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<line x1="30" y1="140" x2="1150" y2="140" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<circle cx="50" cy="140" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="50" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">1983</text>
<text x="50" y="162" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">DNS</text>
<text x="50" y="176" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">introduced</text>

<circle cx="150" cy="140" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="150" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">1984</text>
<text x="150" y="162" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">First root</text>
<text x="150" y="176" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">server</text>

<circle cx="250" cy="140" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="250" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">1985</text>
<text x="250" y="162" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">4 root</text>
<text x="250" y="176" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">servers</text>

<circle cx="350" cy="140" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="350" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">1987</text>
<text x="350" y="162" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">ISI server</text>
<text x="350" y="176" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">renamed</text>

<circle cx="450" cy="140" r="7" fill="#B5D4F4" stroke="#185fa5" stroke-width="0.5"/>
<text x="450" y="118" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#042C53" text-anchor="middle">1995</text>
<text x="450" y="162" font-family="Arial, sans-serif" font-size="11" fill="#185fa5" text-anchor="middle">Single-letter</text>
<text x="450" y="176" font-family="Arial, sans-serif" font-size="11" fill="#185fa5" text-anchor="middle">naming A-M</text>

<circle cx="550" cy="140" r="7" fill="#B5D4F4" stroke="#185fa5" stroke-width="0.5"/>
<text x="550" y="118" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#042C53" text-anchor="middle">1997</text>
<text x="550" y="162" font-family="Arial, sans-serif" font-size="11" fill="#185fa5" text-anchor="middle">13 servers</text>
<text x="550" y="176" font-family="Arial, sans-serif" font-size="11" fill="#185fa5" text-anchor="middle">finalized</text>

<circle cx="650" cy="140" r="7" fill="#F5C4B3" stroke="#993c1d" stroke-width="0.5"/>
<text x="650" y="118" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#4A1B0C" text-anchor="middle">2002</text>
<text x="650" y="162" font-family="Arial, sans-serif" font-size="11" fill="#993c1d" text-anchor="middle">DDoS attack</text>
<text x="650" y="176" font-family="Arial, sans-serif" font-size="11" fill="#993c1d" text-anchor="middle">9 of 13 down</text>

<circle cx="750" cy="140" r="7" fill="#9FE1CB" stroke="#0f6e56" stroke-width="0.5"/>
<text x="750" y="118" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#04342C" text-anchor="middle">2002-08</text>
<text x="750" y="162" font-family="Arial, sans-serif" font-size="11" fill="#0f6e56" text-anchor="middle">Anycast era</text>
<text x="750" y="176" font-family="Arial, sans-serif" font-size="11" fill="#0f6e56" text-anchor="middle">begins</text>

<circle cx="850" cy="140" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="850" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">2006</text>
<text x="850" y="162" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">.mil zone</text>
<text x="850" y="176" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">removed</text>

<circle cx="950" cy="140" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="950" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">2008</text>
<text x="950" y="162" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">IPv6 added</text>
<text x="950" y="176" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">to root zone</text>

<circle cx="1050" cy="140" r="6" fill="#D3D1C7" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="1050" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">2010</text>
<text x="1050" y="162" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">DNSSEC</text>
<text x="1050" y="176" font-family="Arial, sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle">signed at root</text>

<circle cx="1150" cy="140" r="8" fill="#CECBF6" stroke="#534ab7" stroke-width="0.5"/>
<text x="1120" y="118" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#26215C" text-anchor="middle">2025</text>
<text x="1120" y="162" font-family="Arial, sans-serif" font-size="11" fill="#534ab7" text-anchor="middle">~1,950</text>
<text x="1120" y="176" font-family="Arial, sans-serif" font-size="11" fill="#534ab7" text-anchor="middle">instances</text>

<rect x="290" y="220" width="600" height="32" rx="6" fill="#EEEDFE" stroke="#534ab7" stroke-width="0.5"/>
<text x="590" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle">13 names. ~1,950 physical sites. One Root DNS System.</text>

</svg>
